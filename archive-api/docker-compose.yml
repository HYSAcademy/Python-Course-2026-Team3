services:
  nginx:
    image: nginx:alpine
    container_name: archive_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: archive_fastapi
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_PGBOUNCER: ${DATABASE_URL_PGBOUNCER}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
      MAX_EXTRACT_SIZE_MB: ${MAX_EXTRACT_SIZE_MB}
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy 
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  worker:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_PGBOUNCER: ${DATABASE_URL_PGBOUNCER}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy 
      minio:
        condition: service_healthy
    command: >
      sh -c "celery -A app.core.celery_app worker --loglevel=info --concurrency=1"

  redis:
    image: redis:7-alpine
    container_name: archive_redis
    restart: always
    ports:      
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p0
    container_name: archive_pgbouncer
    restart: always
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - POOL_MODE=transaction
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
      - AUTH_TYPE=scram-sha-256
      - LOG_CONNECTIONS=0
      - LOG_DISCONNECTIONS=0
      - LOG_STATS=0
    ports:
      - "6432:5432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: pgvector/pgvector:pg16
    container_name: archive_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: archive_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9005:9000"
      - "9091:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "/usr/bin/mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  rag-service:
    build: 
      context: ../rag-service
      dockerfile: Dockerfile 
    container_name: archive_rag_service
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - ../rag-service/.env
    volumes:
      - ../rag-service/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data: